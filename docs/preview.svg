<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
  </defs>

  <!-- page -->
  <rect width="920" height="640" rx="10" fill="#e9ecf1"/>

  <!-- mail window bar -->
  <rect x="0" y="0" width="920" height="40" rx="10" fill="#dfe3e9"/>
  <rect x="0" y="20" width="920" height="20" fill="#dfe3e9"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>
  <text x="460" y="25" text-anchor="middle" font-size="12" fill="#7b8494">Gmail — Weekly AI-Automation Jobs (Mon &amp; Thu 08:00)</text>

  <!-- email canvas -->
  <rect x="24" y="56" width="872" height="568" rx="10" fill="#ffffff" stroke="#e2e5ea"/>

  <!-- header banner -->
  <rect x="24" y="56" width="872" height="88" rx="10" fill="url(#hdr)"/>
  <rect x="24" y="120" width="872" height="24" fill="#312e81"/>
  <text x="52" y="98" font-size="22" font-weight="800" fill="#ffffff">Weekly AI-Automation Jobs</text>
  <text x="52" y="122" font-size="13" fill="#c7d2fe">Part-time · contract · freelance  ·  10 roles across 6 boards  ·  Jul 20, 2026</text>
  <text x="868" y="100" text-anchor="end" font-size="12" fill="#c7d2fe">2 attachments</text>
  <text x="868" y="120" text-anchor="end" font-size="11.5" fill="#a5b4fc">.xls  ·  chart.png</text>

  <!-- summary strip -->
  <text x="52" y="176" font-size="13" fill="#374151"><tspan font-weight="700" fill="#111827">This week:</tspan> 3 High · 4 Good · 3 Basic  —  Trust score is a transparency signal (0–100), not an official rating.</text>

  <!-- left column: role cards -->
  <!-- card 1 -->
  <rect x="52" y="196" width="470" height="96" rx="9" fill="#fafafa" stroke="#e5e7eb"/>
  <text x="70" y="222" font-size="14.5" font-weight="700" fill="#1f2937">AI Automation Engineer (n8n / Make)</text>
  <text x="70" y="243" font-size="12.5" fill="#6b7280">Remote · Acme Robotics  ·  Contract  ·  $55–70/hr</text>
  <text x="70" y="267" font-size="12" fill="#4b5563">Build and maintain LLM-driven workflows; own webhook integrations</text>
  <text x="70" y="283" font-size="12" fill="#4b5563">and error handling end-to-end.</text>
  <rect x="418" y="208" width="86" height="26" rx="13" fill="#dcfce7"/>
  <text x="461" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">High · 88</text>

  <!-- card 2 -->
  <rect x="52" y="304" width="470" height="96" rx="9" fill="#fafafa" stroke="#e5e7eb"/>
  <text x="70" y="330" font-size="14.5" font-weight="700" fill="#1f2937">Workflow Automation Specialist</text>
  <text x="70" y="351" font-size="12.5" fill="#6b7280">Remote (US) · BrightOps  ·  Part-time  ·  salary undisclosed</text>
  <text x="70" y="375" font-size="12" fill="#4b5563">Automate reporting pipelines across Google Sheets, Slack, and</text>
  <text x="70" y="391" font-size="12" fill="#4b5563">HubSpot; light Python scripting a plus.</text>
  <rect x="418" y="316" width="86" height="26" rx="13" fill="#fef3c7"/>
  <text x="461" y="333" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">Good · 71</text>

  <!-- card 3 -->
  <rect x="52" y="412" width="470" height="96" rx="9" fill="#fafafa" stroke="#e5e7eb"/>
  <text x="70" y="438" font-size="14.5" font-weight="700" fill="#1f2937">Zapier / AI Integrations Freelancer</text>
  <text x="70" y="459" font-size="12.5" fill="#6b7280">Remote · Nimbus Studio  ·  Freelance  ·  $40/hr</text>
  <text x="70" y="483" font-size="12" fill="#4b5563">Short engagement wiring GPT drafting into a CRM; deliver Zaps</text>
  <text x="70" y="499" font-size="12" fill="#4b5563">plus a short handover doc.</text>
  <rect x="418" y="424" width="86" height="26" rx="13" fill="#f3f4f6"/>
  <text x="461" y="441" text-anchor="middle" font-size="12" font-weight="700" fill="#6b7280">Basic · 54</text>

  <!-- right column: trust chart -->
  <rect x="546" y="196" width="322" height="312" rx="9" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="566" y="224" font-size="14" font-weight="700" fill="#111827">Company Trust Score (0–100)</text>
  <line x1="640" y1="240" x2="640" y2="460" stroke="#e5e7eb"/>
  <!-- bars -->
  <g font-size="11.5" fill="#374151">
    <text x="632" y="262" text-anchor="end">Acme Robotics</text>
    <rect x="648" y="252" width="176" height="16" rx="3" fill="#16a34a"/>
    <text x="830" y="264" font-size="11" fill="#6b7280">88</text>

    <text x="632" y="298" text-anchor="end">DataForge</text>
    <rect x="648" y="288" width="164" height="16" rx="3" fill="#16a34a"/>
    <text x="818" y="300" font-size="11" fill="#6b7280">82</text>

    <text x="632" y="334" text-anchor="end">BrightOps</text>
    <rect x="648" y="324" width="142" height="16" rx="3" fill="#d97706"/>
    <text x="796" y="336" font-size="11" fill="#6b7280">71</text>

    <text x="632" y="370" text-anchor="end">Loop Labs</text>
    <rect x="648" y="360" width="128" height="16" rx="3" fill="#d97706"/>
    <text x="782" y="372" font-size="11" fill="#6b7280">64</text>

    <text x="632" y="406" text-anchor="end">Nimbus Studio</text>
    <rect x="648" y="396" width="108" height="16" rx="3" fill="#6b7280"/>
    <text x="762" y="408" font-size="11" fill="#6b7280">54</text>

    <text x="632" y="442" text-anchor="end">QuickTask</text>
    <rect x="648" y="432" width="92" height="16" rx="3" fill="#6b7280"/>
    <text x="746" y="444" font-size="11" fill="#6b7280">46</text>
  </g>
  <!-- legend -->
  <rect x="566" y="474" width="12" height="12" rx="2" fill="#16a34a"/>
  <text x="584" y="484" font-size="11" fill="#6b7280">High ≥ 80</text>
  <rect x="654" y="474" width="12" height="12" rx="2" fill="#d97706"/>
  <text x="672" y="484" font-size="11" fill="#6b7280">Good 60–79</text>
  <rect x="754" y="474" width="12" height="12" rx="2" fill="#6b7280"/>
  <text x="772" y="484" font-size="11" fill="#6b7280">Basic &lt; 60</text>

  <!-- footer -->
  <line x1="52" y1="532" x2="868" y2="532" stroke="#eef0f3"/>
  <text x="52" y="558" font-size="12" fill="#6b7280">Attached: <tspan font-weight="700" fill="#4f46e5">ai-automation-jobs.xls</tspan> (styled sheet) · <tspan font-weight="700" fill="#4f46e5">company-trust-chart.png</tspan></text>
  <text x="52" y="580" font-size="11.5" fill="#9ca3af">Sources: Remotive · Jobicy · JSearch (Indeed / LinkedIn / Glassdoor / ZipRecruiter / Upwork) · Summaries by Google Gemini</text>
  <text x="52" y="600" font-size="11.5" fill="#9ca3af">Retarget to any client by changing one field (recipient) on the Config node.</text>
</svg>
